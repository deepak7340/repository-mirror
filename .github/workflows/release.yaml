name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: |
          set -eux
          make build
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp repository_mirror dist/
          dpkg-deb --build <(echo test) /dev/null 2>&1 || true
          echo "Build OK"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/repository_mirror