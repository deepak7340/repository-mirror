name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          echo "Building version ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          gem install fpm
          make deb rpm

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/repository_mirror
            dist/repository-mirror_*.deb
            dist/repository-mirror-*.rpm