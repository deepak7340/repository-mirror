name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: go build -o repository_mirror ./cmd/repo-sync

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp repository_mirror dist/

          # .deb
          PKG_ROOT="$(mktemp -d)"
          mkdir -p "${PKG_ROOT}/usr/local/bin"
          cp repository_mirror "${PKG_ROOT}/usr/local/bin/"
          mkdir -p "${PKG_ROOT}/DEBIAN"
          {
            echo "Package: repository-mirror"
            echo "Version: ${VERSION}"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Architecture: amd64"
            echo "Maintainer: Deepak Tiwari <deepak@obmondo.com>"
            echo "Description: Repository sync tool for apt/rpm mirrors"
          } > "${PKG_ROOT}/DEBIAN/control"
          dpkg-deb --build "${PKG_ROOT}" "dist/repository-mirror_${VERSION}_amd64.deb"

          # .rpm
          sudo gem install fpm --no-document
          fpm -s dir -t rpm \
            -n repository-mirror \
            -v "${VERSION}" \
            -a x86_64 \
            --prefix /usr/local/bin \
            --description "Repository sync tool for apt/rpm mirrors" \
            --package dist/ \
            repository_mirror=/usr/local/bin/repository_mirror

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/repository_mirror
            dist/repository-mirror_*.deb
            dist/repository-mirror-*.rpm