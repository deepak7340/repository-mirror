name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o repository_mirror ./cmd/repo-sync

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: repository_mirror